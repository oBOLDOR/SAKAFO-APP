<style>
:root {
  --gold: #c9a84c;
  --gold-dim: #c9a84c55;
  --bg: #0f0f0f;
  --card: #181818;
  --card2: #202020;
  --border: #2a2a2a;
  --text: #f0e6c8;
  --text-dim: #888;
  --green: #4caf50;
  --orange: #ff9800;
  --red: #e53935;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

/* ── HEADER ── */
.app-header {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: relative;
}
.app-logo { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }
.app-logo span { color: var(--text-dim); font-size: 12px; display: block; font-family: 'Inter', sans-serif; letter-spacing: 0; font-weight: 400; }
.header-btn { background: var(--card2); border: 1px solid var(--border); color: var(--text-dim); padding: 6px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; }

/* ── SCREENS ── */
.screen { display: none; flex-direction: column; flex: 1; overflow: hidden; }
.screen.active { display: flex; }

/* ── ÉCRAN ACCUEIL ── */
.home-screen { justify-content: center; align-items: center; padding: 24px; gap: 20px; }
.home-title { font-family: 'Barlow Condensed', sans-serif; font-size: 36px; color: var(--gold); letter-spacing: 3px; text-align: center; text-transform: uppercase; }
.home-sub { color: var(--text-dim); font-size: 14px; text-align: center; }
.tables-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 100%; max-width: 380px; }
.table-btn {
  aspect-ratio: 1;
  border-radius: 8px;
  border: 2px solid var(--border);
  background: var(--card);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; font-size: 11px; color: var(--text-dim); gap: 2px; position: relative;
  transition: border-color 0.15s;
}
.table-btn .tnum { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; color: var(--text); font-weight: 700; }
.table-btn.has-order { border-color: var(--gold); }
.table-btn.has-order .tnum { color: var(--gold); }
.table-btn .tbadge {
  position: absolute; top: 4px; right: 4px;
  background: var(--gold); color: #111; border-radius: 50%;
  width: 16px; height: 16px; font-size: 9px; font-weight: 700;
  display: flex; align-items: center; justify-content: center;
}
.new-table-row { display: flex; gap: 8px; width: 100%; max-width: 380px; }
.new-table-input {
  flex: 1; background: var(--card); border: 2px solid var(--border); color: var(--text);
  padding: 12px 14px; border-radius: 8px; font-size: 16px; font-family: 'Inter', sans-serif;
}
.new-table-input:focus { outline: none; border-color: var(--gold); }
.new-table-input::placeholder { color: var(--text-dim); }
.btn-gold {
  background: var(--gold); color: #111; border: none; padding: 12px 18px;
  border-radius: 8px; font-family: 'Barlow Condensed', sans-serif; font-size: 16px;
  font-weight: 700; letter-spacing: 1px; cursor: pointer; text-transform: uppercase;
}
.btn-gold:active { opacity: 0.85; }

/* ── ÉCRAN COMMANDE ── */
.order-screen { background: var(--bg); }
.order-topbar {
  background: var(--card); border-bottom: 1px solid var(--border);
  padding: 10px 14px; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.order-topbar .back-btn { background: none; border: none; color: var(--gold); font-size: 22px; cursor: pointer; padding: 0 4px; }
.order-table-info { flex: 1; }
.order-table-info .tname { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; color: var(--gold); letter-spacing: 1px; }
.order-table-info .tmeta { font-size: 11px; color: var(--text-dim); }
.order-meta-row { display: flex; gap: 6px; padding: 10px 14px; flex-shrink: 0; flex-wrap: wrap; }
.meta-pill { display: flex; flex-direction: column; flex: 1; min-width: 70px; }
.meta-pill label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); margin-bottom: 3px; }
.meta-pill input, .meta-pill select {
  background: var(--card); border: 1px solid var(--border); color: var(--text);
  padding: 7px 8px; border-radius: 6px; font-size: 13px; font-family: 'Inter', sans-serif;
}
.meta-pill input:focus, .meta-pill select:focus { outline: none; border-color: var(--gold); }

/* CATÉGORIES TAB */
.cat-tabs-wrap { flex-shrink: 0; padding: 8px 14px; border-bottom: 1px solid var(--border); }
.cat-tabs-row { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-tabs-row + .cat-tabs-row { margin-top: 6px; }
.cat-tab {
  flex-shrink: 0; padding: 6px 12px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--card);
  color: var(--text-dim); font-size: 12px; cursor: pointer; white-space: nowrap;
}
.cat-tab.shortcut { border-color: var(--gold-dim); color: var(--gold); }
.cat-tab.active { background: var(--gold); color: #111; border-color: var(--gold); font-weight: 600; }

/* LISTE ARTICLES */
.items-list { flex: 1; overflow-y: auto; padding: 0 14px 14px; }
.cat-section { margin-bottom: 4px; }
.cat-section-title {
  font-family: 'Barlow Condensed', sans-serif; font-size: 13px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--gold); padding: 10px 0 4px;
  border-bottom: 1px solid var(--gold-dim); margin-bottom: 4px;
}
.item-card {
  background: var(--card); border: 1px solid var(--border); border-radius: 8px;
  margin-bottom: 6px; overflow: hidden;
}
.item-card.has-qty { border-color: var(--gold-dim); }
.item-card.sent { opacity: 0.6; }
.item-main {
  display: flex; align-items: center; gap: 8px; padding: 10px 10px 10px 12px;
}
.item-info { flex: 1; min-width: 0; }
.item-info .iname { font-size: 13px; color: var(--text); line-height: 1.3; }
.item-info .isub { font-size: 10px; color: var(--text-dim); font-style: italic; margin-top: 1px; }
.item-info .isent { font-size: 10px; color: var(--green); font-weight: 600; margin-top: 2px; }
.qty-ctrl { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.qty-btn {
  width: 28px; height: 28px; border-radius: 6px;
  background: var(--card2); border: 1px solid var(--border);
  color: var(--gold); font-size: 18px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1;
}
.qty-btn:active { background: var(--gold-dim); }
.qty-num { width: 22px; text-align: center; font-size: 15px; font-weight: 700; color: var(--text); }
.opt-btn {
  width: 28px; height: 28px; border-radius: 6px;
  background: var(--card2); border: 1px solid var(--border);
  color: var(--text-dim); font-size: 14px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.opt-btn.has-opts { border-color: var(--gold); color: var(--gold); }

/* PANEL OPTIONS */
.opts-panel { display: none; padding: 8px 12px 10px; border-top: 1px solid var(--border); background: #141414; }
.opts-panel.open { display: block; }
.opts-label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); margin-bottom: 5px; }
.chips-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; }
.chip {
  padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border);
  font-size: 11px; color: var(--text-dim); background: transparent; cursor: pointer;
}
.chip.on { background: var(--gold); color: #111; border-color: var(--gold); font-weight: 600; }
.remark-input {
  width: 100%; background: var(--card); border: 1px solid var(--border); color: var(--text);
  padding: 6px 8px; border-radius: 6px; font-size: 12px; font-family: 'Inter', sans-serif;
  resize: none; height: 40px;
}
.remark-input::placeholder { color: #555; }

/* ── BOTTOMBAR ── */
.bottom-bar {
  background: var(--card); border-top: 2px solid var(--gold);
  padding: 10px 14px; display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.bar-info { flex: 1; }
.bar-new { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; color: var(--gold); letter-spacing: 1px; }
.bar-sent { font-size: 11px; color: var(--green); }
.bar-btn {
  padding: 10px 16px; border-radius: 8px; font-family: 'Barlow Condensed', sans-serif;
  font-size: 15px; font-weight: 700; letter-spacing: 1px; cursor: pointer; border: none;
  text-transform: uppercase;
}
.bar-btn.recap { background: var(--card2); color: var(--gold); border: 1px solid var(--gold-dim); }
.bar-btn.send { background: var(--gold); color: #111; }
.bar-btn:active { opacity: 0.8; }

/* ── MODALS ── */
.overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.88);
  z-index: 200; align-items: flex-end; justify-content: center;
}
.overlay.open { display: flex; }
.modal {
  background: var(--card); border: 2px solid var(--gold); border-radius: 16px 16px 0 0;
  width: 100%; max-width: 480px; max-height: 80vh; display: flex; flex-direction: column;
}
.modal-head {
  padding: 14px 16px; display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.modal-head h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; color: var(--gold); letter-spacing: 1px; }
.modal-x { background: none; border: 1px solid var(--border); color: var(--text-dim); width: 30px; height: 30px; border-radius: 50%; font-size: 16px; cursor: pointer; }
.modal-body { flex: 1; overflow-y: auto; padding: 14px 16px; }
.modal-footer { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-shrink: 0; }
.modal-footer button { flex: 1; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: none; }
.btn-cancel { background: var(--card2); color: var(--text-dim); border: 1px solid var(--border) !important; }
.btn-confirm { background: var(--gold); color: #111; }

/* RECAP MODAL */
.recap-sec { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); padding: 8px 0 4px; border-bottom: 1px solid var(--gold-dim); margin-bottom: 4px; margin-top: 8px; }
.recap-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
.recap-row:last-child { border-bottom: none; }
.recap-tags { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
.tag-s { font-size: 10px; font-weight: 600; color: var(--green); }
.tag-p { font-size: 10px; font-weight: 600; color: var(--orange); }
.empty-msg { color: var(--text-dim); font-size: 13px; text-align: center; padding: 20px; }

/* CONFIRM MODAL */
.confirm-icon { text-align: center; font-size: 40px; margin-bottom: 8px; }
.confirm-title { text-align: center; font-family: 'Barlow Condensed', sans-serif; font-size: 20px; color: var(--gold); letter-spacing: 1px; }
.confirm-sub { text-align: center; font-size: 13px; color: var(--text-dim); margin-top: 6px; }

/* NOTE GLOBALE */
.note-glob-wrap { padding: 10px 14px; flex-shrink: 0; }
.note-glob-wrap label { font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); display: block; margin-bottom: 4px; }
.note-glob-input {
  width: 100%; background: var(--card); border: 1px solid var(--border); color: var(--text);
  padding: 8px 10px; border-radius: 6px; font-size: 12px; font-family: 'Inter', sans-serif;
  resize: none; height: 44px;
}
.note-glob-input::placeholder { color: #555; }

/* PRINT */
#print-zone { display: none; }
@media print {
  * {
    background: #fff !important;
    color: #000 !important;
    -webkit-print-color-adjust: exact !important;
    print-color-adjust: exact !important;
  }
  body > * { display: none !important; }
  #print-zone {
    display: block !important; font-family: 'Courier New', monospace;
    font-size: 13px; color: #000 !important; background: #fff !important;
    width: 80mm; padding: 4mm;
  }
  .pt-head { text-align: center; border-bottom: 2px dashed #000; padding-bottom: 6px; margin-bottom: 8px; background: #fff !important; }
  .pt-head h2 { font-size: 16px; font-weight: bold; letter-spacing: 2px; color: #000 !important; }
  .pt-complement { font-size: 14px; font-weight: bold; border: 2px solid #000; display: inline-block; padding: 2px 10px; margin-top: 4px; color: #000 !important; background: #fff !important; }
  .pt-meta { font-size: 12px; margin-bottom: 6px; border-bottom: 1px dashed #000; padding-bottom: 6px; color: #000 !important; }
  .pt-meta p { margin: 1px 0; color: #000 !important; }
  .pt-sec { font-size: 11px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; border-top: 1px solid #000; margin-top: 6px; padding-top: 3px; color: #000 !important; background: #fff !important; }
  .pt-row { display: flex; justify-content: space-between; font-size: 13px; padding: 2px 0; color: #000 !important; }
  .pt-opts { font-size: 11px; padding-left: 10px; color: #333 !important; }
  .pt-note { font-size: 11px; padding-left: 10px; font-style: italic; color: #333 !important; }
  .pt-foot { border-top: 2px dashed #000; margin-top: 8px; padding-top: 6px; text-align: center; font-size: 11px; color: #000 !important; }
  .pt-glob { border-top: 1px dashed #000; margin-top: 6px; padding-top: 5px; font-size: 12px; color: #000 !important; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="app-header">
  <div class="app-logo">Sakafo Gasy <span>Au Bol d'Or · Vitry-sur-Seine</span></div>
  <button class="header-btn" id="header-close-btn" style="display:none" onclick="askClose()">✕ Fermer table</button>
</div>

<!-- ÉCRAN ACCUEIL -->
<div class="screen home-screen active" id="screen-home">
  <div class="home-title">🍽 Tables</div>
  <div class="home-sub">Sélectionne une table ou tape un numéro</div>
  <div class="tables-grid" id="tables-grid"></div>
</div>

<!-- ÉCRAN COMMANDE -->
<div class="screen order-screen" id="screen-order">
  <div class="order-topbar">
    <button class="back-btn" onclick="goHome()">‹</button>
    <div class="order-table-info">
      <div class="tname" id="order-title">Table —</div>
      <div class="tmeta" id="order-meta">Nouvelle commande</div>
    </div>
  </div>
  <div class="order-meta-row">
    <div class="meta-pill" style="min-width:120px;">
      <label>Table</label>
      <input type="text" id="meta-table-label" placeholder="ex: T1+T2" style="font-weight:600;color:var(--gold);">
    </div>
    <div class="meta-pill">
      <label>Couverts</label>
      <input type="number" id="meta-couverts" placeholder="nb" min="1" max="20">
    </div>
    <div class="meta-pill">
      <label>Service</label>
      <select id="meta-service">
        <option value="">--</option>
        <option>Midi</option>
        <option>Soir</option>
        <option>Emporter</option>
        <option>Livraison</option>
      </select>
    </div>
    <div class="meta-pill">
      <label>Serveur</label>
      <input type="text" id="meta-serveur" placeholder="prénom">
    </div>
  </div>
  <!-- Champs spéciaux À emporter -->
  <div id="emporter-fields" style="display:none;padding:0 14px 8px;gap:8px;display:none;flex-wrap:wrap;">
    <div class="meta-pill" style="min-width:120px;">
      <label>N° Commande</label>
      <input type="text" id="meta-num-cmd" placeholder="ex: 001" readonly style="background:#c9a84c22;color:var(--gold);font-weight:700;">
    </div>
    <div class="meta-pill" style="min-width:140px;">
      <label>Nom client</label>
      <input type="text" id="meta-nom-client" placeholder="Prénom client">
    </div>
    <div class="meta-pill" style="min-width:100px;">
      <label>Heure retrait</label>
      <input type="time" id="meta-heure-retrait">
    </div>
  </div>
  <div class="cat-tabs-wrap" id="cat-tabs-wrap">
    <div class="cat-tabs-row" id="cat-tabs-shortcuts"></div>
    <div class="cat-tabs-row" id="cat-tabs"></div>
  </div>
  <div class="items-list" id="items-list"></div>
  <div class="note-glob-wrap">
    <label>Note générale</label>
    <textarea class="note-glob-input" id="note-globale" placeholder="Allergie, demande spéciale..."></textarea>
  </div>
  <div class="bottom-bar">
    <div class="bar-info">
      <div class="bar-new" id="bar-new">0 article(s)</div>
      <div class="bar-sent" id="bar-sent"></div>
    </div>
    <button class="bar-btn recap" onclick="openRecap()">👁 Table</button>
    <button class="bar-btn send" onclick="sendOrder()">🖨 Envoyer</button>
  </div>
</div>

<!-- MODAL RÉCAP -->
<div class="overlay" id="modal-recap">
  <div class="modal">
    <div class="modal-head">
      <h3 id="recap-title">Récap Table</h3>
      <button class="modal-x" onclick="closeModal('modal-recap')">✕</button>
    </div>
    <div class="modal-body" id="recap-body"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('modal-recap')">Fermer</button>
    </div>
  </div>
</div>

<!-- MODAL CONFIRMATION FERMETURE -->
<div class="overlay" id="modal-confirm">
  <div class="modal" style="border-radius:16px;max-height:auto;">
    <div class="modal-body" style="padding:24px 20px 10px;">
      <div class="confirm-icon">🗑</div>
      <div class="confirm-title">Fermer la table ?</div>
      <div class="confirm-sub">Toutes les commandes de cette table seront effacées.</div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('modal-confirm')">Annuler</button>
      <button class="btn-confirm" onclick="closeModal('modal-confirm'); closeTable();">Confirmer</button>
    </div>
  </div>
</div>

<!-- BANNIÈRE INSTALL -->
<div id="install-banner" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:500;background:#111;border-top:2px solid #c9a84c;padding:12px 16px;align-items:center;gap:10px;max-width:480px;margin:0 auto;">
  <div style="flex:1;">
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:15px;color:#c9a84c;letter-spacing:1px;">Installer l'application</div>
    <div style="font-size:11px;color:#888;margin-top:2px;">Accès rapide depuis l'écran d'accueil</div>
  </div>
  <button id="install-btn" style="background:#c9a84c;color:#111;border:none;padding:8px 16px;border-radius:6px;font-weight:700;font-size:13px;cursor:pointer;">Installer</button>
  <button id="install-close" style="background:none;border:none;color:#666;font-size:20px;cursor:pointer;padding:0 4px;">✕</button>
</div>

<!-- ZONE IMPRESSION -->
<div id="print-zone"></div>

<script>
// ══════════════════════════════════════════
// DONNÉES MENU
// ══════════════════════════════════════════
const MENU = [
  { cat: "Entrées froides & chaudes", items: [
    { n: "Salade de crudités" },
    { n: "Œufs mayonnaise" },
    { n: "Gyoza au poulet", opts: ["Sauce soja","Sauce pimentée"], note: true },
    { n: "Nems au Poulet / Porc (4 pcs)", opts: ["Poulet","Porc"] },
    { n: "Samoussa Bœuf / Poulet / Porc (4 pcs)", opts: ["Bœuf","Poulet","Porc"] },
    { n: "Van Tan bits (6 pcs)" },
    { n: "Boulettes de bœuf (6 pcs)" },

// ══════════════════════════════════════════
// ÉCRAN ACCUEIL
// ══════════════════════════════════════════
function buildHome() {
  const grid = document.getElementById('tables-grid');
  grid.innerHTML = '';

  // Zones
  const zones = [...new Set(TABLES.map(t => t.zone))];
  zones.forEach(zone => {
    // Titre de zone
    const zoneTitle = document.createElement('div');
    zoneTitle.style.cssText = 'grid-column:1/-1;font-family:"Barlow Condensed",sans-serif;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);padding:6px 0 2px;border-bottom:1px solid var(--gold-dim);margin-bottom:2px;';
    zoneTitle.textContent = zone;
    grid.appendChild(zoneTitle);

    // Tables de cette zone
    TABLES.filter(t => t.zone === zone).forEach(t => {
      const btn = document.createElement('div');
      const hasOrder = tables[t.id];
      const rounds = tables[t.id]?.rounds || [];
      const totalSent = rounds.reduce((s, r) => s + r.items.reduce((a, it) => a + it.qty, 0), 0);
      btn.className = 'table-btn' + (hasOrder ? ' has-order' : '');
      btn.innerHTML = `
        <span class="tnum" style="font-size:14px;line-height:1.2;">${t.label}</span>
        <span style="font-size:9px;">${hasOrder ? 'En cours' : 'Libre'}</span>
        ${totalSent > 0 ? `<span class="tbadge">${totalSent}</span>` : ''}`;
      btn.onclick = () => openTable(t.id);
      grid.appendChild(btn);
    });
  });

  // Bouton À emporter
  const emporterBtn = document.createElement('div');
  emporterBtn.style.cssText = 'grid-column:1/-1;margin-top:8px;';
  emporterBtn.innerHTML = `
    <div class="table-btn has-order" style="aspect-ratio:auto;padding:12px;flex-direction:row;gap:10px;border-color:var(--orange, #ff9800);width:100%;" onclick="openTable('EMPORTER')">
      <span style="font-size:22px;">🥡</span>
      <div style="text-align:left;">
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;color:#ff9800;letter-spacing:1px;">À Emporter</div>
        <div style="font-size:10px;color:var(--text-dim);">${tables['EMPORTER'] ? 'En cours' : 'Nouvelle commande'}</div>
      </div>
    </div>`;
  grid.appendChild(emporterBtn);
}

function goHome() {
  showScreen('home');
  document.getElementById('header-close-btn').style.display = 'none';
  buildHome();
}

function openTable(id) {
  if (!id) return;
  currentTable = id;
  if (!tables[id]) tables[id] = { couverts: '', service: '', serveur: '', rounds: [] };

  // Reset UI
  MENU.forEach(cat => cat.items.forEach((item, i) => {
    const key = makeKey(cat.cat, i);
    uiQty[key] = 0;
    uiOpts[key] = [];
    uiNote[key] = '';
  }));

  // Nom de la table
  const tableInfo = TABLES.find(t => t.id === id);
  const defaultLabel = id === 'EMPORTER' ? '🥡 À Emporter' : (tableInfo ? tableInfo.label : id);
  const tableName = tables[id]?.label || defaultLabel;
  document.getElementById('order-title').textContent = tableName;
  document.getElementById('meta-table-label').value = tableName;

  // Champs spéciaux À emporter
  const emporterFields = document.getElementById('emporter-fields');
  if (id === 'EMPORTER') {
    emporterFields.style.display = 'flex';
    document.getElementById('meta-service').value = 'Emporter';
    // Numéro de commande auto
    const lastNum = parseInt(localStorage.getItem('sakafo_last_cmd_num') || '0');
    const newNum = lastNum + 1;
    localStorage.setItem('sakafo_last_cmd_num', newNum);
    document.getElementById('meta-num-cmd').value = String(newNum).padStart(3, '0');
    document.getElementById('meta-nom-client').value = '';
    document.getElementById('meta-heure-retrait').value = '';
  } else {
    emporterFields.style.display = 'none';
    document.getElementById('meta-service').value = tables[id].service || '';
  }

  document.getElementById('meta-couverts').value = tables[id].couverts || '';
  document.getElementById('meta-serveur').value = tables[id].serveur || '';
  document.getElementById('note-globale').value = '';
  document.getElementById('header-close-btn').style.display = 'block';

  buildOrderScreen();
  updateOrderMeta();
  updateBar();
  showScreen('order');
}

function makeKey(cat, idx) {
  return `${cat.replace(/\s+/g,'_')}_${idx}`;
}

// ══════════════════════════════════════════
function buildOrderScreen() {
  // Ligne 1 — Raccourcis rapides
  const shortcutsRow = document.getElementById('cat-tabs-shortcuts');
  shortcutsRow.innerHTML = '';
  const allTab = document.createElement('div');
  allTab.className = 'cat-tab active';
  allTab.textContent = 'Tout';
  allTab.onclick = () => scrollToAll(allTab);
  shortcutsRow.appendChild(allTab);

  const shortcuts = [
    { label: "🍽 Sakafo", cat: "Sakafo Gasy + Lasary" },
    { label: "📅 Vendredi / WE", cat: "Vendredi soir & Week-end" },
    { label: "🥤 Boissons", cat: "Boissons sans alcool" },
    { label: "🍺 Bières & Vins", cat: "Bières & Vins" },
    { label: "🍨 Desserts", cat: "Desserts & Glaces" },
  ];
  shortcuts.forEach(({ label, cat }) => {
    const t = document.createElement('div');
    t.className = 'cat-tab shortcut';
    t.textContent = label;
    t.onclick = () => scrollToCat(cat, t);
    shortcutsRow.appendChild(t);
  });

  // Ligne 2 — Toutes les catégories sauf celles déjà en raccourci
  const shortcutCats = shortcuts.map(s => s.cat);
  const tabs = document.getElementById('cat-tabs');
  tabs.innerHTML = '';
  MENU.forEach(cat => {
    if (shortcutCats.includes(cat.cat)) return; // déjà en raccourci
    const t = document.createElement('div');
    t.className = 'cat-tab';
    t.textContent = cat.cat;
    t.onclick = () => scrollToCat(cat.cat, t);
    tabs.appendChild(t);
  });

  // Items
  const list = document.getElementById('items-list');
  list.innerHTML = '';
  MENU.forEach(cat => {
    const sec = document.createElement('div');
    sec.className = 'cat-section';
    sec.id = `cat_${cat.cat.replace(/\s+/g,'_')}`;
    sec.innerHTML = `<div class="cat-section-title">${cat.cat}</div>`;

    cat.items.forEach((item, i) => {
      const key = makeKey(cat.cat, i);
      uiQty[key] = uiQty[key] || 0;
      uiOpts[key] = uiOpts[key] || [];
      uiNote[key] = uiNote[key] || '';

      const sentQty = getSentQty(key);
      const hasExtra = item.opts || item.note;

      const card = document.createElement('div');
      card.className = 'item-card' + (sentQty > 0 ? ' sent' : '');
      card.id = `card_${key}`;

      card.innerHTML = `
        <div class="item-main">
          <div class="item-info">
            <div class="iname">${item.n}</div>
            ${item.sub ? `<div class="isub">${item.sub}</div>` : ''}
            ${sentQty > 0 ? `<div class="isent" id="sent_${key}">✓ ${sentQty} déjà envoyé(s)</div>` : `<div class="isent" id="sent_${key}" style="display:none"></div>`}
          </div>
          <div class="qty-ctrl">
            <button class="qty-btn" onclick="changeQty('${key}',-1)">−</button>
            <span class="qty-num" id="qn_${key}">0</span>
            <button class="qty-btn" onclick="changeQty('${key}',1)">+</button>
            ${hasExtra ? `<button class="opt-btn" id="optbtn_${key}" onclick="toggleOpts('${key}')">⚙</button>` : ''}
          </div>
        </div>
        ${hasExtra ? `
        <div class="opts-panel" id="opts_${key}">
          ${item.opts ? `<div class="opts-label">Options</div><div class="chips-row" id="chips_${key}">
            ${item.opts.map(o => `<button class="chip" onclick="toggleChip('${key}','${o}',this)">${o}</button>`).join('')}
          </div>` : ''}
          ${item.note ? `<div class="opts-label" style="margin-top:${item.opts?'4px':'0'}">Remarque</div>
            <textarea class="remark-input" id="remark_${key}" placeholder="ex: sans piment, cuisson saignante..." oninput="uiNote['${key}']=this.value"></textarea>` : ''}
        </div>` : ''}
      `;
      sec.appendChild(card);
    });
    list.appendChild(sec);
  });
}

function getSentQty(key) {
  if (!currentTable || !tables[currentTable]) return 0;
  return tables[currentTable].rounds.reduce((s, r) => {
    const found = r.items.find(it => it.key === key);
    return s + (found ? found.qty : 0);
  }, 0);
}

// ══════════════════════════════════════════
// INTERACTIONS
// ══════════════════════════════════════════
function changeQty(key, delta) {
  uiQty[key] = Math.max(0, (uiQty[key] || 0) + delta);
  document.getElementById(`qn_${key}`).textContent = uiQty[key];
  const card = document.getElementById(`card_${key}`);
  if (card) card.classList.toggle('has-qty', uiQty[key] > 0);
  updateBar();
}

function toggleOpts(key) {
  const panel = document.getElementById(`opts_${key}`);
  const btn = document.getElementById(`optbtn_${key}`);
  if (!panel) return;
  panel.classList.toggle('open');
  btn.classList.toggle('has-opts', panel.classList.contains('open'));
}

function toggleChip(key, opt, el) {
  const arr = uiOpts[key];
  const i = arr.indexOf(opt);
  if (i >= 0) { arr.splice(i, 1); el.classList.remove('on'); }
  else { arr.push(opt); el.classList.add('on'); }
}

function scrollToCat(catName, tabEl) {
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  const sec = document.getElementById(`cat_${catName.replace(/\s+/g,'_')}`);
  if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function scrollToAll(tabEl) {
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  document.getElementById('items-list').scrollTo({ top: 0, behavior: 'smooth' });
}

// ══════════════════════════════════════════
// BARRE BAS
// ══════════════════════════════════════════
function updateBar() {
  let newCount = 0;
  Object.keys(uiQty).forEach(k => { if (uiQty[k] > 0) newCount += uiQty[k]; });
  const sent = currentTable ? tables[currentTable].rounds.reduce((s, r) => s + r.items.reduce((a, it) => a + it.qty, 0), 0) : 0;
  const rounds = currentTable ? tables[currentTable].rounds.length : 0;
  document.getElementById('bar-new').textContent = newCount > 0 ? `${newCount} article(s) à envoyer` : 'Aucun article';
  document.getElementById('bar-sent').textContent = sent > 0 ? `✓ ${sent} envoyé(s) – Bon #${rounds}` : '';
}

function updateOrderMeta() {
  const t = tables[currentTable];
  const rounds = t.rounds.length;
  document.getElementById('order-meta').textContent = rounds > 0 ? `${rounds} bon(s) envoyé(s) en cuisine` : 'Nouvelle commande';
}

// ══════════════════════════════════════════
// ENVOYER EN CUISINE
// ══════════════════════════════════════════
function sendOrder() {
  // Collecter les nouveaux articles avec le nom du plat
  const newItems = [];
  Object.keys(uiQty).forEach(k => {
    if (uiQty[k] > 0) {
      // Trouver le nom du plat
      let itemName = '';
      MENU.forEach(cat => cat.items.forEach((it, i) => {
        if (makeKey(cat.cat, i) === k) itemName = it.n;
      }));
      newItems.push({ key: k, name: itemName, qty: uiQty[k], opts: [...uiOpts[k]], note: uiNote[k] });
    }
  });

  if (newItems.length === 0) { showToast('Aucun article à envoyer !'); return; }

  // Sauvegarder meta
  const t = tables[currentTable];
  t.couverts = document.getElementById('meta-couverts').value;
  t.service = document.getElementById('meta-service').value;
  t.serveur = document.getElementById('meta-serveur').value;
  // Label personnalisé
  const customLabel = document.getElementById('meta-table-label').value.trim();
  if (customLabel) {
    t.label = customLabel;
    document.getElementById('order-title').textContent = customLabel;
  }
  if (currentTable === 'EMPORTER') {
    t.numCmd = document.getElementById('meta-num-cmd').value;
    t.nomClient = document.getElementById('meta-nom-client').value;
    t.heureRetrait = document.getElementById('meta-heure-retrait').value;
  }

  // Enregistrer le round
  t.rounds.push({ items: newItems, heure: now() });
  const roundNum = t.rounds.length;
  const isComplement = roundNum > 1;

  // Imprimer
  printRound(newItems, roundNum, isComplement, t);

  // Reset UI des articles envoyés
  newItems.forEach(({ key, qty }) => {
    uiQty[key] = 0;
    document.getElementById(`qn_${key}`).textContent = 0;
    const card = document.getElementById(`card_${key}`);
    if (card) { card.classList.remove('has-qty'); card.classList.add('sent'); }
    const sentEl = document.getElementById(`sent_${key}`);
    if (sentEl) { sentEl.style.display = ''; sentEl.textContent = `✓ ${getSentQty(key)} déjà envoyé(s)`; }
  });

  updateBar();
  updateOrderMeta();
  syncTableToFirebase(currentTable);
  saveToLocal();
  showToast(isComplement ? `⚡ Complément #${roundNum-1} envoyé !` : '✓ 1er bon envoyé en cuisine !');
}

function printRound(items, roundNum, isComplement, tableData) {
  const table = currentTable;
  const heure = now();
  const date = new Date().toLocaleDateString('fr-FR');

  // Regrouper par catégorie
  let sectHTML = '';
  let lastCat = '';
  items.forEach(({ key, qty, opts, note }) => {
    let itemName = '', catName = '';
    MENU.forEach(cat => cat.items.forEach((it, i) => {
      if (makeKey(cat.cat, i) === key) { itemName = it.n; catName = cat.cat; }
    }));
    if (catName !== lastCat) {
      lastCat = catName;
      sectHTML += `<div class="pt-sec">${catName}</div>`;
    }
    sectHTML += `<div class="pt-row"><span>${itemName}</span><span><b>x${qty}</b></span></div>`;
    if (opts?.length) sectHTML += `<div class="pt-opts">→ ${opts.join(' / ')}</div>`;
    if (note) sectHTML += `<div class="pt-note">✎ ${note}</div>`;
  });

  const noteGlob = document.getElementById('note-globale').value;
  const label = isComplement ? `⚡ COMPLÉMENT #${roundNum - 1}` : '— 1er BON —';

  document.getElementById('print-zone').innerHTML = `
    <div class="pt-head">
      <h2>BON DE COMMANDE</h2>
      <p>Au Bol d'Or · Vitry-sur-Seine</p>
      ${isComplement ? `<div class="pt-complement">⚡ COMPLÉMENT #${roundNum-1}</div>` : ''}
      ${currentTable === 'EMPORTER' ? `<div class="pt-complement" style="border:2px solid #000;">🥡 À EMPORTER</div>` : ''}
    </div>
    <div class="pt-meta">
      ${currentTable === 'EMPORTER' ? `
      <p><b>N° Commande :</b> ${tableData.numCmd || '?'}</p>
      <p><b>Client :</b> ${tableData.nomClient || '?'}</p>
      <p><b>Retrait :</b> ${tableData.heureRetrait || '?'}</p>` : `
      <p><b>Table :</b> ${tableData.label || currentTable} &nbsp; <b>Couverts :</b> ${tableData.couverts || '?'}</p>`}
      <p><b>Service :</b> ${tableData.service || '?'} &nbsp; <b>Serveur :</b> ${tableData.serveur || '?'}</p>
      <p><b>Heure :</b> ${heure} &nbsp; <b>Bon :</b> ${label}</p>
    </div>
    ${sectHTML}
    ${noteGlob ? `<div class="pt-glob"><b>⚠ NOTE :</b> ${noteGlob}</div>` : ''}
    <div class="pt-foot">— BON CUISINE —<br>${date} ${heure}</div>
  `;
  window.print();
}

// ══════════════════════════════════════════
// RÉCAP TABLE
// ══════════════════════════════════════════
function openRecap() {
  const t = tables[currentTable];
  document.getElementById('recap-title').textContent = `Table ${currentTable}`;
  let html = '';
  let hasAny = false;
  let lastCat = '';

  // Agréger tout ce qui est envoyé + en attente
  const agg = {};
  if (t) {
    t.rounds.forEach(r => r.items.forEach(({ key, qty, opts, note }) => {
      if (!agg[key]) agg[key] = { sent: 0, pending: 0, opts, note };
      agg[key].sent += qty;
    }));
  }
  Object.keys(uiQty).forEach(k => {
    if (uiQty[k] > 0) {
      if (!agg[k]) agg[k] = { sent: 0, pending: 0, opts: uiOpts[k], note: uiNote[k] };
      agg[k].pending += uiQty[k];
    }
  });

  MENU.forEach(cat => cat.items.forEach((item, i) => {
    const key = makeKey(cat.cat, i);
    const d = agg[key];
    if (d && (d.sent + d.pending) > 0) {
      hasAny = true;
      if (cat.cat !== lastCat) {
        lastCat = cat.cat;
        html += `<div class="recap-sec">${cat.cat}</div>`;
      }
      html += `<div class="recap-row">
        <span>${item.n}</span>
        <div class="recap-tags">
          ${d.sent > 0 ? `<span class="tag-s">✓ ${d.sent} envoyé</span>` : ''}
          ${d.pending > 0 ? `<span class="tag-p">+ ${d.pending} en attente</span>` : ''}
        </div>
      </div>`;
    }
  }));

  if (!hasAny) html = '<div class="empty-msg">Aucune commande pour cette table.</div>';
  document.getElementById('recap-body').innerHTML = html;
  openModal('modal-recap');
}

// ══════════════════════════════════════════
// FERMETURE TABLE
// ══════════════════════════════════════════
function askClose() { openModal('modal-confirm'); }

function closeTable() {
  closeTableOnFirebase(currentTable);
  delete tables[currentTable];
  saveToLocal();
  currentTable = null;
  goHome();
}

// ══════════════════════════════════════════
// UTILITAIRES
// ══════════════════════════════════════════
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
}

function openModal(id) { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function now() {
  return new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
}

let toastTimer;
function showToast(msg) {
  let t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.cssText = `position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--gold);color:#111;padding:10px 20px;border-radius:20px;font-weight:700;font-size:13px;z-index:999;pointer-events:none;transition:opacity 0.3s;`;
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.opacity = '0'; }, 2500);
}

// Fermer modals en cliquant l'overlay
document.querySelectorAll('.overlay').forEach(ov => {
  ov.addEventListener('click', e => { if (e.target === ov) ov.classList.remove('open'); });
});

// ── INIT ──
buildHome();
function syncTableToFirebase(tableId) {
  if (!window.fbDb) return;
  const t = tables[tableId];
  if (!t) return;
  const tableInfo = TABLES.find(tb => tb.id === tableId);
  const label = tableId === 'EMPORTER' ? '🥡 À Emporter' : (tableInfo ? tableInfo.label : tableId);
  const r = window.fbRef(window.fbDb, `tables/${tableId}`);
  window.fbSet(r, {
    label: label,
    couverts: t.couverts || '',
    service: t.service || '',
    serveur: t.serveur || '',
    numCmd: t.numCmd || '',
    nomClient: t.nomClient || '',
    heureRetrait: t.heureRetrait || '',
    rounds: t.rounds || [],
    updatedAt: Date.now()
  });
}

function closeTableOnFirebase(tableNum) {
  if (!window.fbDb) return;
  const r = window.fbRef(window.fbDb, `tables/${tableNum}`);
  window.fbRemove(r);
}

function listenToAllTables() {
  if (!window.fbDb) return;
  const r = window.fbRef(window.fbDb, 'tables');
  window.fbOnValue(r, (snapshot) => {
    const data = snapshot.val() || {};
    // Mettre à jour les tables distantes (pas la table en cours d'édition)
    Object.keys(data).forEach(num => {
      const n = parseInt(num);
      if (n !== currentTable) {
        tables[n] = data[n];
      }
    });
    // Nettoyer les tables fermées
    Object.keys(tables).forEach(n => {
      if (!data[n] && parseInt(n) !== currentTable) delete tables[parseInt(n)];
    });
    buildHome();
  });
}

document.addEventListener('firebase-ready', () => {
  listenToAllTables();
});

// ── SAUVEGARDE AUTOMATIQUE localStorage ──
const LS_KEY = 'sakafo_tables';

function saveToLocal() {
  try {
    localStorage.setItem(LS_KEY, JSON.stringify(tables));
  } catch(e) {}
}

function loadFromLocal() {
  try {
    const data = localStorage.getItem(LS_KEY);
    if (data) {
      const parsed = JSON.parse(data);
      Object.keys(parsed).forEach(k => {
        tables[parseInt(k)] = parsed[k];
      });
    }
  } catch(e) {}
}

// Charger au démarrage
loadFromLocal();
buildHome();

// Sauvegarder automatiquement toutes les 10 secondes
setInterval(saveToLocal, 10000);

// Sauvegarder quand on quitte la page
window.addEventListener('beforeunload', saveToLocal);
window.addEventListener('pagehide', saveToLocal);

// ── PWA Service Worker ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}

// ── Bannière install Android ──
let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  const banner = document.getElementById('install-banner');
  if (banner) banner.style.display = 'flex';
});
document.addEventListener('click', e => {
  if (e.target.id === 'install-btn' && deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(() => {
      deferredPrompt = null;
      const banner = document.getElementById('install-banner');
      if (banner) banner.style.display = 'none';
    });
  }
  if (e.target.id === 'install-close') {
    const banner = document.getElementById('install-banner');
    if (banner) banner.style.display = 'none';
  }
});
</script>
