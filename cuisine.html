<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Cuisine">
<title>Écran Cuisine – Au Bol d'Or</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB5G9DWiVGMaFt6vYCQmiHe41vD8YWHQIM",
    authDomain: "oboldor-60767.firebaseapp.com",
    databaseURL: "https://oboldor-60767-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "oboldor-60767",
    storageBucket: "oboldor-60767.firebasestorage.app",
    messagingSenderId: "1045584552616",
    appId: "1:1045584552616:web:95485f0ebb270b07e8989d"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  window.fbDb = db;
  window.fbRef = ref;
  window.fbUpdate = update;
  window.fbOnValue = onValue;
  document.dispatchEvent(new Event('firebase-ready'));
</script>
<style>
:root {
  --bg: #111;
  --card: #1a1a1a;
  --border: #2a2a2a;
  --gold: #c9a84c;
  --green: #4caf50;
  --red: #e53935;
  --orange: #ff9800;
  --text: #f0f0f0;
  --dim: #888;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
.header {
  background: #000;
  border-bottom: 2px solid var(--gold);
  padding: 12px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 10;
}
.header h1 { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }
.header-right { display: flex; align-items: center; gap: 10px; }
.live-dot { width: 10px; height: 10px; background: var(--green); border-radius: 50%; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.time { font-size: 13px; color: var(--dim); }
.btn-tout-valider {
  background: var(--green); color: #fff; border: none;
  padding: 8px 14px; border-radius: 6px;
  font-family: 'Barlow Condensed', sans-serif; font-size: 14px;
  font-weight: 700; letter-spacing: 1px; cursor: pointer;
}

/* EMPTY */
.empty {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 70vh; gap: 12px;
}
.empty-icon { font-size: 60px; }
.empty-text { font-size: 16px; color: var(--dim); }

/* GRID BONS */
.bons-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
  padding: 16px;
}

/* BON CARTE */
.bon-card {
  background: var(--card);
  border: 2px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  transition: border-color 0.2s;
}
.bon-card.complement { border-color: var(--orange); }
.bon-card.done { opacity: 0.4; border-color: var(--green); }

.bon-head {
  background: #222;
  padding: 10px 14px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid var(--border);
}
.bon-table { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; color: var(--gold); letter-spacing: 1px; }
.bon-info { font-size: 11px; color: var(--dim); margin-top: 1px; }
.bon-badge {
  padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
}
.badge-new { background: var(--gold); color: #111; }
.badge-comp { background: var(--orange); color: #111; }
.badge-done { background: var(--green); color: #fff; }

.bon-items { padding: 10px 14px; }
.bon-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
}
.bon-item:last-child { border-bottom: none; }
.bon-item-check {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  border: 2px solid var(--border);
  background: transparent;
  cursor: pointer;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  color: transparent;
  transition: all 0.15s;
}
.bon-item-check.checked {
  background: var(--green);
  border-color: var(--green);
  color: #fff;
}
.bon-item-info { flex: 1; }
.bon-item-name { font-size: 13px; color: var(--text); line-height: 1.3; }
.bon-item-opts { font-size: 11px; color: var(--gold); margin-top: 2px; }
.bon-item-note { font-size: 11px; color: var(--orange); font-style: italic; margin-top: 2px; }
.bon-item-qty {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 20px; font-weight: 700; color: var(--gold);
  flex-shrink: 0;
}

.bon-foot {
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
}
.btn-valider {
  flex: 1; padding: 10px; border-radius: 6px; border: none;
  font-family: 'Barlow Condensed', sans-serif; font-size: 16px;
  font-weight: 700; letter-spacing: 1px; cursor: pointer;
  background: var(--green); color: #fff;
}
.btn-valider.done { background: var(--border); color: var(--dim); }
.btn-valider:active { opacity: 0.8; }

/* TOAST */
#toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: var(--green); color: #fff; padding: 10px 20px;
  border-radius: 20px; font-weight: 700; font-size: 13px;
  z-index: 999; pointer-events: none; opacity: 0; transition: opacity 0.3s;
}
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🍳 Cuisine</h1>
  </div>
  <div class="header-right">
    <div class="live-dot"></div>
    <div class="time" id="clock"></div>
    <button class="btn-tout-valider" onclick="toutValider()">✅ Tout valider</button>
  </div>
</div>

<div id="bons-container">
  <div class="empty">
    <div class="empty-icon">🕐</div>
    <div class="empty-text">En attente de commandes...</div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── Horloge ──
function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();

// ── État local des items cochés ──
const checkedItems = {}; // `tableNum_roundIdx_itemIdx` -> bool

// ── Écouter Firebase ──
document.addEventListener('firebase-ready', () => {
  const r = window.fbRef(window.fbDb, 'tables');
  window.fbOnValue(r, (snapshot) => {
    const data = snapshot.val() || {};
    renderBons(data);
  });
});

function renderBons(data) {
  const container = document.getElementById('bons-container');

  // Collecter tous les bons (rounds) de toutes les tables
  const allBons = [];
  Object.keys(data).forEach(tableNum => {
    const table = data[tableNum];
    const rounds = table.rounds || [];
    rounds.forEach((round, roundIdx) => {
      if (!round || !round.items || round.items.length === 0) return;
      allBons.push({
        tableNum: tableNum,
        tableLabel: data[tableNum].label || `Table ${tableNum}`,
        roundIdx,
        round,
        table,
        isDone: round.done || false,
        isComplement: roundIdx > 0,
      });
    });
  });

  if (allBons.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🕐</div>
        <div class="empty-text">En attente de commandes...</div>
      </div>`;
    return;
  }

  // Trier : non-validés en premier, puis par heure
  allBons.sort((a, b) => {
    if (a.isDone !== b.isDone) return a.isDone ? 1 : -1;
    return (a.round.timestamp || 0) - (b.round.timestamp || 0);
  });

  let html = '<div class="bons-grid">';
  allBons.forEach((bon) => {
    const { tableNum, tableLabel, roundIdx, round, table, isDone, isComplement } = bon;
    const label = roundIdx === 0 ? '1er BON' : `⚡ COMPLÉMENT #${roundIdx}`;
    const badgeClass = isDone ? 'badge-done' : isComplement ? 'badge-comp' : 'badge-new';
    const badgeText = isDone ? '✅ VALIDÉ' : label;
    const cardClass = isDone ? 'bon-card done' : isComplement ? 'bon-card complement' : 'bon-card';

    let itemsHTML = '';
    (round.items || []).forEach((item, itemIdx) => {
      const itemKey = `${tableNum}_${roundIdx}_${itemIdx}`;
      const isChecked = checkedItems[itemKey] || false;
      itemsHTML += `
        <div class="bon-item">
          <div class="bon-item-check ${isChecked ? 'checked' : ''}" onclick="toggleItem('${itemKey}', this)">
            ${isChecked ? '✓' : ''}
          </div>
          <div class="bon-item-info">
            <div class="bon-item-name">${getItemName(item)}</div>
            ${item.opts && item.opts.length ? `<div class="bon-item-opts">→ ${item.opts.join(' / ')}</div>` : ''}
            ${item.note ? `<div class="bon-item-note">✎ ${item.note}</div>` : ''}
          </div>
          <div class="bon-item-qty">x${item.qty}</div>
        </div>`;
    });

    html += `
      <div class="${cardClass}" id="bon_${tableNum}_${roundIdx}">
        <div class="bon-head">
          <div>
            <div class="bon-table">${tableLabel}</div>
            <div class="bon-info">${table.couverts ? table.couverts + ' couverts' : ''} ${table.serveur ? '· ' + table.serveur : ''} · ${round.heure || ''}</div>
          </div>
          <span class="bon-badge ${badgeClass}">${badgeText}</span>
        </div>
        <div class="bon-items">${itemsHTML}</div>
        <div class="bon-foot">
          <button class="btn-valider ${isDone ? 'done' : ''}" onclick="validerBon('${tableNum}', ${roundIdx})">
            ${isDone ? '✅ Validé' : '✅ Valider ce bon'}
          </button>
        </div>
      </div>`;
  });
  html += '</div>';
  container.innerHTML = html;
}

function getItemName(item) {
  return item.name || item.key || '?';
}

function toggleItem(itemKey, el) {
  checkedItems[itemKey] = !checkedItems[itemKey];
  el.classList.toggle('checked', checkedItems[itemKey]);
  el.textContent = checkedItems[itemKey] ? '✓' : '';
}

function validerBon(tableNum, roundIdx) {
  if (!window.fbDb) return;
  const r = window.fbRef(window.fbDb, `tables/${tableNum}/rounds/${roundIdx}/done`);
  window.fbUpdate(window.fbRef(window.fbDb, `tables/${tableNum}/rounds/${roundIdx}`), { done: true });
  showToast(`✅ Table ${tableNum} — Bon #${roundIdx + 1} validé !`);
}

function toutValider() {
  if (!window.fbDb) return;
  const r = window.fbRef(window.fbDb, 'tables');
  window.fbOnValue(r, (snapshot) => {
    const data = snapshot.val() || {};
    Object.keys(data).forEach(tableNum => {
      const rounds = data[tableNum].rounds || [];
      rounds.forEach((round, roundIdx) => {
        if (!round.done) {
          window.fbUpdate(window.fbRef(window.fbDb, `tables/${tableNum}/rounds/${roundIdx}`), { done: true });
        }
      });
    });
  }, { onlyOnce: true });
  showToast('✅ Tous les bons validés !');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.opacity = '0'; }, 2500);
}
</script>
</body>
</html>
